# Project config

_templates_suffix: .cpr
_subdirectory: template


# Questions
project_name:
  type: str
  prompt: Replace with your project name
  default: "my_project"

# Messages to user

_message_before_copy: |
  Thanks for generating a project using our template.
  
  You'll be asked a series of questions whose answers will be used to
  generate a tailored project for you.

_message_after_copy: |
  Your project "{{ project_name }}" has been created successfully!
  
  Next steps:
  
  1. Change directory to the project root:
  
     $ cd {{ _copier_conf.dst_path }}
  
  2. Read the "README.md" and start coding.


_message_before_update: |
  Thanks for updating your project using our template.
  
  You'll be asked a series of questions whose answers are pre-populated
  with previously entered values. Feel free to change them as needed.

_message_after_update: |
  Your project "{{ project_name }}" has been updated successfully!
  In case there are any conflicts, please resolve them. Then,
  you're done.


_tasks:
  # 1 Create a virtual environment
  - "cd {{ project_name }} && git init"
  - "cd {{ project_name }} && uv sync --extra dev"
  # 2. Set up the env file
  - "cd {{ project_name }} && cp ./{{project_name}}/envs/.env.example.dev .env"


  # 3. Run migrations using the correct settings
  - export DJANGO_SETTINGS_MODULE={{project_name}}.settings.dev && cd {{ project_name }} && ./.venv/bin/python manage.py makemigrations
  - export DJANGO_SETTINGS_MODULE={{project_name}}.settings.dev && cd {{ project_name }} && ./.venv/bin/python manage.py migrate

  # 4. Final message instead of blocking server
  - export DJANGO_SETTINGS_MODULE={{project_name}}.settings.dev && cd {{ project_name }} && ./.venv/bin/python manage.py check